name: Deploy to Firebase Hosting on Commit

env:
  PRIVATE_USER: ${{ vars.PRIVATE_USER }}

on: 
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install && npm run generate
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PEYTON_9DFE4 }}'
          projectId: peyton-9dfe4
          channelId: beta
